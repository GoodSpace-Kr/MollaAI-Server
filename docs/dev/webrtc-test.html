<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MollaTalk WebRTC Test</title>
  <style>
    :root {
      color-scheme: light;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #1f2933;
    }

    body {
      margin: 0;
      padding: 24px;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 18px;
      font-size: 24px;
    }

    section {
      margin-bottom: 16px;
      padding: 16px;
      border: 1px solid #d9dee7;
      border-radius: 8px;
      background: #fff;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 650;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #c6ceda;
      border-radius: 6px;
      padding: 10px 12px;
      font: inherit;
    }

    textarea {
      min-height: 92px;
      resize: vertical;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .inline-option {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 12px;
      font-weight: 500;
    }

    .inline-option input {
      width: auto;
    }

    button {
      min-height: 40px;
      border: 1px solid #1b5fbf;
      border-radius: 6px;
      padding: 0 14px;
      background: #1f6feb;
      color: #fff;
      font: inherit;
      font-weight: 650;
      cursor: pointer;
    }

    button.secondary {
      border-color: #a9b4c4;
      background: #fff;
      color: #26384d;
    }

    button.danger {
      border-color: #b42318;
      background: #d92d20;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    audio {
      width: 100%;
      margin-top: 8px;
    }

    pre {
      min-height: 260px;
      max-height: 460px;
      overflow: auto;
      margin: 0;
      padding: 12px;
      border-radius: 6px;
      background: #111827;
      color: #d1fae5;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 13px;
      line-height: 1.45;
    }

    .status {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .pill {
      border: 1px solid #d9dee7;
      border-radius: 6px;
      padding: 8px 10px;
      background: #f8fafc;
      font-size: 13px;
    }

    .pill strong {
      display: block;
      margin-bottom: 2px;
      font-size: 12px;
      color: #526171;
    }

    @media (max-width: 720px) {
      body {
        padding: 14px;
      }

      .grid,
      .status {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
<main>
  <h1>MollaTalk WebRTC Test</h1>

  <section>
    <div class="grid">
      <div>
        <label for="baseUrl">Backend Base URL</label>
        <input id="baseUrl" value="https://api.mollatalk.com" />
      </div>
      <div>
        <label for="iceServers">ICE Servers JSON</label>
        <input id="iceServers" value='[{"urls":"stun:stun.l.google.com:19302"}]' />
      </div>
    </div>
    <div style="margin-top: 12px;">
      <label for="accessToken">Access Token</label>
      <textarea id="accessToken" placeholder="Bearer 없이 access token만 붙여넣기"></textarea>
    </div>
    <label class="inline-option" for="relayOnly">
      <input id="relayOnly" type="checkbox" />
      Relay only
    </label>
  </section>

  <section>
    <div class="actions">
      <button id="startButton">Start Call</button>
      <button id="endButton" class="danger" disabled>End Call</button>
      <button id="clearButton" class="secondary">Clear Log</button>
    </div>

    <div class="status">
      <div class="pill"><strong>Call Session ID</strong><span id="callSessionId">-</span></div>
      <div class="pill"><strong>Agent Realtime Session ID</strong><span id="agentRealtimeSessionId">-</span></div>
      <div class="pill"><strong>PeerConnection</strong><span id="pcState">idle</span></div>
    </div>

    <audio id="remoteAudio" autoplay controls></audio>
  </section>

  <section>
    <pre id="log"></pre>
  </section>
</main>

<script>
  let peerConnection = null;
  let localStream = null;
  let audioTransceiver = null;
  let callSessionId = "";
  let agentRealtimeSessionId = "";
  let appRealtimeSessionId = "";

  const elements = {
    baseUrl: document.getElementById("baseUrl"),
    iceServers: document.getElementById("iceServers"),
    accessToken: document.getElementById("accessToken"),
    relayOnly: document.getElementById("relayOnly"),
    startButton: document.getElementById("startButton"),
    endButton: document.getElementById("endButton"),
    clearButton: document.getElementById("clearButton"),
    log: document.getElementById("log"),
    callSessionId: document.getElementById("callSessionId"),
    agentRealtimeSessionId: document.getElementById("agentRealtimeSessionId"),
    pcState: document.getElementById("pcState"),
    remoteAudio: document.getElementById("remoteAudio"),
  };

  function log(message, data) {
    const time = new Date().toISOString();
    const suffix = data === undefined ? "" : "\n" + JSON.stringify(data, null, 2);
    elements.log.textContent += `[${time}] ${message}${suffix}\n`;
    elements.log.scrollTop = elements.log.scrollHeight;
  }

  function setState() {
    elements.callSessionId.textContent = callSessionId || "-";
    elements.agentRealtimeSessionId.textContent = agentRealtimeSessionId || "-";
    elements.pcState.textContent = peerConnection
      ? `${peerConnection.connectionState} / ICE ${peerConnection.iceConnectionState}`
      : "idle";
    elements.startButton.disabled = Boolean(peerConnection);
    elements.endButton.disabled = !callSessionId;
  }

  function getBaseUrl() {
    return elements.baseUrl.value.trim().replace(/\/$/, "");
  }

  function getToken() {
    const token = elements.accessToken.value.trim();
    if (!token) {
      throw new Error("Access token is required.");
    }
    return token;
  }

  async function api(path, options = {}) {
    const response = await fetch(getBaseUrl() + path, {
      ...options,
      headers: {
        "Authorization": "Bearer " + getToken(),
        "Content-Type": "application/json",
        ...(options.headers || {}),
      },
    });
    const text = await response.text();
    let body = null;
    try {
      body = text ? JSON.parse(text) : null;
    } catch {
      body = text;
    }
    log(`${options.method || "GET"} ${path} -> ${response.status}`, body);
    if (!response.ok) {
      throw new Error(typeof body === "string" ? body : JSON.stringify(body));
    }
    return body;
  }

  function parseIceServers() {
    const raw = elements.iceServers.value.trim();
    if (!raw) {
      return [];
    }
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed)) {
      throw new Error("ICE Servers JSON must be an array.");
    }
    return parsed;
  }

  function resolveIceServers(startResponse) {
    const backendIceServers = startResponse?.data?.iceServers;
    if (Array.isArray(backendIceServers) && backendIceServers.length > 0) {
      return backendIceServers;
    }
    return parseIceServers();
  }

  function redactIceServers(iceServers) {
    return iceServers.map((server) => ({
      ...server,
      credential: server.credential ? "[redacted]" : server.credential,
    }));
  }

  function waitForIceGatheringComplete(pc) {
    if (pc.iceGatheringState === "complete") {
      return Promise.resolve();
    }
    return new Promise((resolve) => {
      const timeout = setTimeout(() => {
        pc.removeEventListener("icegatheringstatechange", onStateChange);
        log("ICE gathering wait timed out; continuing with current localDescription.");
        resolve();
      }, 5000);

      function onStateChange() {
        log("ICE gathering state: " + pc.iceGatheringState);
        if (pc.iceGatheringState === "complete") {
          clearTimeout(timeout);
          pc.removeEventListener("icegatheringstatechange", onStateChange);
          resolve();
        }
      }

      pc.addEventListener("icegatheringstatechange", onStateChange);
    });
  }

  function waitForPeerConnectionReady(pc) {
    if (pc.connectionState === "connected" || pc.iceConnectionState === "connected" || pc.iceConnectionState === "completed") {
      return Promise.resolve();
    }
    return new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        cleanupListeners();
        reject(new Error("Timed out waiting for WebRTC connection before subscribing audio track."));
      }, 15000);

      function cleanupListeners() {
        clearTimeout(timeout);
        pc.removeEventListener("connectionstatechange", onStateChange);
        pc.removeEventListener("iceconnectionstatechange", onStateChange);
      }

      function onStateChange() {
        if (pc.connectionState === "connected" || pc.iceConnectionState === "connected" || pc.iceConnectionState === "completed") {
          cleanupListeners();
          resolve();
          return;
        }
        if (pc.connectionState === "failed" || pc.iceConnectionState === "failed") {
          cleanupListeners();
          reject(new Error("WebRTC connection failed before subscribing audio track."));
        }
      }

      pc.addEventListener("connectionstatechange", onStateChange);
      pc.addEventListener("iceconnectionstatechange", onStateChange);
    });
  }

  function describeSdp(label, description) {
    const sdp = description?.sdp || "";
    const mediaLines = sdp.split(/\r?\n/).filter((line) => line.startsWith("m="));
    const candidateLines = sdp.split(/\r?\n/).filter((line) => line.startsWith("a=candidate:"));
    log(`${label} SDP summary`, {
      type: description?.type || "",
      mediaLines,
      candidateCount: candidateLines.length,
      hasEndOfCandidates: sdp.includes("a=end-of-candidates"),
    });
  }

  async function logIceStats(label) {
    if (!peerConnection) {
      return;
    }
    const stats = await peerConnection.getStats();
    const rows = [];
    stats.forEach((report) => {
      if (["local-candidate", "remote-candidate", "candidate-pair", "transport"].includes(report.type)) {
        rows.push({
          type: report.type,
          id: report.id,
          candidateType: report.candidateType,
          protocol: report.protocol,
          address: report.address || report.ip,
          port: report.port,
          state: report.state,
          nominated: report.nominated,
          selected: report.selected,
          localCandidateId: report.localCandidateId,
          remoteCandidateId: report.remoteCandidateId,
          iceState: report.iceState,
          dtlsState: report.dtlsState,
          selectedCandidatePairId: report.selectedCandidatePairId,
          requestsSent: report.requestsSent,
          responsesReceived: report.responsesReceived,
          requestsReceived: report.requestsReceived,
          responsesSent: report.responsesSent,
          bytesSent: report.bytesSent,
          bytesReceived: report.bytesReceived,
        });
      }
    });
    log(label, rows);
  }

  async function getOutboundAudioBytesSent(pc) {
    const stats = await pc.getStats();
    let bytesSent = 0;
    stats.forEach((report) => {
      if (report.type === "outbound-rtp" && report.kind === "audio" && !report.isRemote) {
        bytesSent += report.bytesSent || 0;
      }
    });
    return bytesSent;
  }

  async function waitForOutboundAudioPackets(pc) {
    for (let attempt = 1; attempt <= 20; attempt += 1) {
      const bytesSent = await getOutboundAudioBytesSent(pc);
      log(`Outbound audio bytes before subscribe: ${bytesSent}`);
      if (bytesSent > 0) {
        return;
      }
      await new Promise((resolve) => window.setTimeout(resolve, 250));
    }
    throw new Error("Timed out waiting for outbound audio packets before subscribing audio track.");
  }

  function getLocalTrackMetadata() {
    return peerConnection.getTransceivers()
      .filter((transceiver) => transceiver.sender && transceiver.sender.track)
      .map((transceiver, index) => ({
        location: "local",
        mid: transceiver.mid ?? String(index),
        trackName: transceiver.sender.track.kind === "audio" ? "user_audio" : transceiver.sender.track.kind,
      }));
  }

  async function startCall() {
    try {
      elements.startButton.disabled = true;
      log("Starting backend session...");
      const startResponse = await api("/api/v1/sessions/start", { method: "POST" });
      callSessionId = startResponse?.data?.id || "";
      agentRealtimeSessionId = startResponse?.data?.agentRealtimeSessionId || "";
      if (!callSessionId || !agentRealtimeSessionId) {
        throw new Error("Missing id or agentRealtimeSessionId in /sessions/start response.");
      }
      setState();

      log("Creating RTCPeerConnection...");
      const iceServers = resolveIceServers(startResponse);
      log("Using ICE servers.", redactIceServers(iceServers));
      peerConnection = new RTCPeerConnection({
        iceServers,
        iceTransportPolicy: elements.relayOnly.checked ? "relay" : "all",
      });
      log("ICE transport policy: " + (elements.relayOnly.checked ? "relay" : "all"));

      peerConnection.oniceconnectionstatechange = () => {
        log("ICE state: " + peerConnection.iceConnectionState);
        setState();
      };

      peerConnection.onconnectionstatechange = () => {
        log("PeerConnection state: " + peerConnection.connectionState);
        setState();
      };

      peerConnection.onicecandidate = (event) => {
        if (!event.candidate) {
          log("ICE gathering completed.");
        }
      };

      peerConnection.ontrack = (event) => {
        log("Remote track received: " + event.track.kind);
        if (event.streams && event.streams[0]) {
          elements.remoteAudio.srcObject = event.streams[0];
        }
      };

      log("Preparing initial recvonly audio transceiver...");
      audioTransceiver = peerConnection.addTransceiver("audio", { direction: "recvonly" });

      log("Creating initial local offer...");
      const offer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(offer);
      log("Waiting for ICE gathering to complete...");
      await waitForIceGatheringComplete(peerConnection);
      describeSdp("Initial local offer", peerConnection.localDescription);

      log("Sending app WebRTC offer to backend...");
      const answerResponse = await api(`/api/v1/sessions/${callSessionId}/webrtc/offer`, {
        method: "POST",
        body: JSON.stringify({
          agentRealtimeSessionId,
          sessionDescription: {
            type: peerConnection.localDescription.type,
            sdp: peerConnection.localDescription.sdp,
          },
          tracks: [],
        }),
      });

      const answer = answerResponse?.data?.sessionDescription;
      appRealtimeSessionId = answerResponse?.data?.appRealtimeSessionId || "";
      if (appRealtimeSessionId) {
        log("App realtime session created: " + appRealtimeSessionId);
      }
      if (!answer?.type || !answer?.sdp) {
        throw new Error("Missing sessionDescription in /webrtc/offer response.");
      }
      describeSdp("Remote answer", answer);
      await peerConnection.setRemoteDescription(answer);
      log("Remote description applied.");
      window.setTimeout(() => logIceStats("ICE stats after remote description"), 1000);
      window.setTimeout(() => logIceStats("ICE stats after 6 seconds"), 6000);
      log("Waiting for WebRTC connection before subscribing audio track...");
      await waitForPeerConnectionReady(peerConnection);

      log("Requesting microphone...");
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      const audioTrack = localStream.getAudioTracks()[0];
      if (!audioTrack) {
        throw new Error("No microphone audio track was returned.");
      }
      await audioTransceiver.sender.replaceTrack(audioTrack);
      audioTransceiver.direction = "sendrecv";
      log("Microphone attached to existing audio transceiver.");

      log("Creating track publish offer...");
      const publishOffer = await peerConnection.createOffer();
      await peerConnection.setLocalDescription(publishOffer);
      log("Waiting for track publish ICE gathering to complete...");
      await waitForIceGatheringComplete(peerConnection);
      describeSdp("Track publish offer", peerConnection.localDescription);
      const publishTracks = getLocalTrackMetadata();
      if (publishTracks.length === 0) {
        throw new Error("No local WebRTC tracks were found before publishing.");
      }
      log("Publishing app audio track to Cloudflare...");
      const publishResponse = await api(`/api/v1/sessions/${callSessionId}/webrtc/tracks`, {
        method: "POST",
        body: JSON.stringify({
          agentRealtimeSessionId,
          appRealtimeSessionId,
          sessionDescription: {
            type: peerConnection.localDescription.type,
            sdp: peerConnection.localDescription.sdp,
          },
          tracks: publishTracks,
        }),
      });
      const publishAnswer = publishResponse?.data?.sessionDescription;
      if (!publishAnswer?.type || !publishAnswer?.sdp) {
        throw new Error("Missing sessionDescription in /webrtc/tracks response.");
      }
      const publishedTracks = Array.isArray(publishResponse?.data?.tracks) ? publishResponse.data.tracks : [];
      const audioTrackName = publishedTracks.find((track) => track?.trackName)?.trackName || publishTracks[0]?.trackName || "user_audio";
      log("Cloudflare published tracks.", publishedTracks);
      describeSdp("Track publish answer", publishAnswer);
      await peerConnection.setRemoteDescription(publishAnswer);
      log("Track publish remote description applied.");

      log("Waiting for outbound audio packets before subscribing audio track...");
      await waitForOutboundAudioPackets(peerConnection);
      log("Subscribing app audio track to orchestrator...");
      await api(`/api/v1/sessions/${callSessionId}/webrtc/subscribe`, {
        method: "POST",
        body: JSON.stringify({
          agentRealtimeSessionId,
          appRealtimeSessionId,
          trackName: audioTrackName,
        }),
      });
      log("Subscribe request completed.");
      setState();
    } catch (error) {
      log("Start failed: " + (error?.message || error));
      await cleanup(false);
      setState();
    }
  }

  async function endCall() {
    try {
      elements.endButton.disabled = true;
      log("Ending call...");
      await cleanup(true);
      log("Ended.");
    } catch (error) {
      log("End failed: " + (error?.message || error));
    } finally {
      setState();
    }
  }

  async function cleanup(notifyBackend) {
    if (peerConnection) {
      peerConnection.close();
      peerConnection = null;
    }
    if (localStream) {
      for (const track of localStream.getTracks()) {
        track.stop();
      }
      localStream = null;
    }
    audioTransceiver = null;
    elements.remoteAudio.srcObject = null;

    if (notifyBackend && callSessionId) {
      await api(`/api/v1/sessions/${callSessionId}/end`, { method: "PATCH" });
    }

    callSessionId = "";
    agentRealtimeSessionId = "";
    appRealtimeSessionId = "";
  }

  elements.startButton.addEventListener("click", startCall);
  elements.endButton.addEventListener("click", endCall);
  elements.clearButton.addEventListener("click", () => {
    elements.log.textContent = "";
  });
  window.addEventListener("beforeunload", () => {
    if (peerConnection) {
      peerConnection.close();
    }
    if (localStream) {
      for (const track of localStream.getTracks()) {
        track.stop();
      }
    }
  });

  setState();
</script>
</body>
</html>
