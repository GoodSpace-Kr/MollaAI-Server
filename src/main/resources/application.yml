spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/molla_db
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
        default_batch_fetch_size: 100

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:molla-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}
  access-token-expiration-ms: 3600000
  refresh-token-expiration-ms: 2592000000

naver:
  sens:
    access-key: ${NAVER_SENS_ACCESS_KEY}
    secret-key: ${NAVER_SENS_SECRET_KEY}
    service-id: ${NAVER_SENS_SERVICE_ID}
    from-number: ${NAVER_SENS_FROM_NUMBER:01057807344}
    base-url: https://sens.apigw.ntruss.com

openai:
  api-key: ${OPENAI_API_KEY}
  base-url: https://api.openai.com/v1
  model: gpt-4o
  embedding-model: text-embedding-3-small

qdrant:
  host: ${QDRANT_HOST:localhost}
  port: ${QDRANT_PORT:6333}
  collection-name: molla_turns

aws:
  region: ${AWS_REGION}
  credentials:
    access-key-id: ${AWS_ACCESS_KEY_ID:${AWS_S3_ACCESS_KEY:}}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:${AWS_S3_SECRET_KEY:}}
    session-token: ${AWS_SESSION_TOKEN:}
  s3:
    audio-bucket: ${ORCH_S3_AUDIO_BUCKET}
    audio-prefix: ${ORCH_S3_AUDIO_PREFIX:}
    presign-expiration-minutes: ${S3_AUDIO_PRESIGN_EXPIRATION_MINUTES:60}

nicepay:
  # 실서비스 전환 시 아래 두 줄 변경
  # 테스트: https://sandbox-api.nicepay.co.kr
  # 실서비스: https://api.nicepay.co.kr
  base-url: https://sandbox-api.nicepay.co.kr

  #실서비스 전환 시 환경변수로 실키 값 교체
  client-key: ${NICEPAY_CLIENT_KEY:S2_fb903ce81792411ab6c459ec3a2a82c6}
  secret-key: ${NICEPAY_SECRET_KEY:36e730803c7f45f3ae1462408083c94c}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

logging:
  level:
    com.molla: DEBUG
    org.springframework.security: INFO
