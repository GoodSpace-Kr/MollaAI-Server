name: Deploy

on:
  push:
    branches:
      - main

env:
  IMAGE_NAME: docker.io/goodspace/molla-server
  DEPLOY_PATH: /opt/mollaai

jobs:
  ci:
    if: ${{ github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew clean test --no-build-cache

      - name: Build application
        run: ./gradlew build -x test

  build-and-push:
    if: ${{ github.actor != 'nektos/act' }}
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    if: ${{ github.actor != 'nektos/act' }}
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: docker-compose.yml
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
          AWS_S3_ACCESS_KEY: ${{ secrets.AWS_S3_ACCESS_KEY }}
          AWS_S3_SECRET_KEY: ${{ secrets.AWS_S3_SECRET_KEY }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: DEPLOY_PATH,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,AWS_SESSION_TOKEN,AWS_S3_ACCESS_KEY,AWS_S3_SECRET_KEY
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}
            touch .env
            python3 - <<'PY'
            from pathlib import Path
            import os

            env_path = Path(".env")
            existing = {}
            if env_path.exists():
                for line in env_path.read_text().splitlines():
                    if "=" in line and not line.lstrip().startswith("#"):
                        key, value = line.split("=", 1)
                        existing[key] = value

            for key in [
                "AWS_ACCESS_KEY_ID",
                "AWS_SECRET_ACCESS_KEY",
                "AWS_SESSION_TOKEN",
                "AWS_S3_ACCESS_KEY",
                "AWS_S3_SECRET_KEY",
            ]:
                value = os.getenv(key)
                if value:
                    existing[key] = value

            env_path.write_text("".join(f"{key}={value}\n" for key, value in existing.items()))
            PY
            docker rm -f molla-server || true
            docker compose pull
            docker compose up -d
            if ! docker ps --filter name=molla-server --filter status=running | grep -q molla-server; then
              echo "molla-server failed to start"
              docker ps -a --filter name=molla-server
              docker ps --filter publish=8080
              exit 1
            fi

      - name: Smoke test deployed server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}
            docker compose ps
            docker inspect molla-server --format 'image={{.Config.Image}} status={{.State.Status}} started={{.State.StartedAt}}'
            if ! docker ps --filter name=molla-server --filter status=running | grep -q molla-server; then
              echo "molla-server is not running"
              docker ps -a --filter name=molla-server
              docker logs molla-server --tail 200 || true
              exit 1
            fi

            for i in $(seq 1 12); do
              if curl -fsS http://127.0.0.1:8080/actuator/health || curl -fsS http://127.0.0.1:8080/health; then
                echo "smoke test passed"
                docker logs molla-server --tail 80
                exit 0
              fi
              status_code="$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/ || true)"
              if [ "$status_code" != "000" ] && [ "${status_code#5}" = "$status_code" ]; then
                echo "smoke test passed with root HTTP status=$status_code"
                docker logs molla-server --tail 80
                exit 0
              fi
              echo "waiting for backend health check... attempt=$i"
              sleep 5
            done

            echo "smoke test failed"
            docker logs molla-server --tail 200 || true
            exit 1
